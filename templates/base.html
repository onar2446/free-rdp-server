<!doctype html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>{{ title or "مدرّس قريب" }}</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
	<header class="site-header">
		<div class="container">
			<h1 class="site-title"><a href="{{ url_for('index') }}">مدرّس قريب</a></h1>
		</div>
	</header>
	<main class="container">
		{% block content %}{% endblock %}
	</main>
	<footer class="site-footer">
		<div class="container small">
			<span>© {{ 2025 }} مدرّس قريب — يعتمد على بيانات <a href="https://www.openstreetmap.org/" target="_blank" rel="noopener">OpenStreetMap</a></span>
		</div>
	</footer>
	<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
